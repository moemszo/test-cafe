  <head>

    >

  <body class="catchphrase-background-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="ひだまり猫珈琲 ホーム">
        <span class="brand-mark">H</span>
        <span>
          <span class="brand-name">ひだまり猫珈琲</span>
          <span class="brand-subtitle">Cat Cafe & Roastery</span>
        </span>

      <nav class="site-nav" aria-label="メインメニュー">

        <a href="menu.html">メニュー</a>
        <a href="copy.html" aria-current="page">キャッチコピー</a>
      </nav>
    </header>

    <main class="copy-page">
      <section class="copy-hero">
        <p class="eyebrow">Catch Copy</p>
        <h1>ひだまりで、猫とほどける。</h1>
        <p>
          忙しい日ほど、やわらかい時間を。ひだまり猫珈琲は、珈琲の香りと猫の気配がそっと重なる場所です。
        </p>
      </section>

      <section class="copy-list" aria-label="キャッチコピー候補">
        <article class="copy-card">
          <span>01</span>
          <img
            class="copy-illustration"
            src="assets/copy-illustration-01.png"
            alt="眠る猫と珈琲をそばに置いた人の手元のやさしいイラスト"
          >
          <h2>一杯の珈琲と、ひとつの寝息。</h2>
        </article>
        <article class="copy-card">
          <span>02</span>
          <img
            class="copy-illustration"
            src="assets/copy-illustration-02.png"
            alt="のんびりした猫に合わせてくつろぐ人のやさしいイラスト"
          >
          <h2>猫が急がないから、私も急がない。</h2>
        </article>
        <article class="copy-card">
          <span>03</span>
          <img
            class="copy-illustration"
            src="assets/copy-illustration-03.png"
            alt="猫と珈琲とノートのある静かな午後のやさしいイラスト"
          >
          <h2>今日の余白を、猫と珈琲で満たす。</h2>
        </article>
      </section>

      <div class="page-actions">
        <a class="button primary" href="index.html">ホームへ戻る</a>
